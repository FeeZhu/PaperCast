# render.yaml
services:
  - type: web
    name: papercast-backend
    runtime: python3.11
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python start.py"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DEEPSEEK_API_KEY
        value: ""
    healthCheckPath: "/api/status"